<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Alexander OS" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Alexander OS</title>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow" id="todayLabel">Сегодня</p>
        <h1 id="screenTitle">Главная</h1>
      </div>
      <button class="icon-btn" id="settingsButton" type="button" aria-label="Настройки">⚙</button>
    </header>

    <main id="app" class="content" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="Навигация">
      <button class="nav-item active" type="button" data-screen="dashboard"><span>⌂</span><small>Сегодня</small></button>
      <button class="nav-item" type="button" data-screen="tasks"><span>✓</span><small>Задачи</small></button>
      <button class="nav-item" type="button" data-screen="finance"><span>₽</span><small>Финансы</small></button>
      <button class="nav-item" type="button" data-screen="projects"><span>▦</span><small>Проекты</small></button>
      <button class="nav-item" type="button" data-screen="growth"><span>↗</span><small>Прогресс</small></button>
    </nav>
  </div>

  <dialog id="modal" class="modal">
    <form class="modal-card" id="modalForm" novalidate>
      <div class="modal-head">
        <h2 id="modalTitle">Добавить</h2>
        <button class="icon-btn" id="modalClose" type="button" aria-label="Закрыть">✕</button>
      </div>
      <div id="modalBody"></div>
      <div class="modal-actions" id="modalActions">
        <button class="btn secondary" id="modalCancel" type="button">Отмена</button>
        <button class="btn primary" id="modalSubmit" type="submit">Сохранить</button>
      </div>
    </form>
  </dialog>

  <dialog id="settingsModal" class="modal">
    <div class="modal-card">
      <div class="modal-head">
        <h2>Настройки</h2>
        <button class="icon-btn" id="closeSettings" type="button" aria-label="Закрыть">✕</button>
      </div>
      <div id="settingsBody"></div>
    </div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
