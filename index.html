<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#06140d" />
  <meta name="description" content="Alexander OS - личная система финансов, задач, проектов и прогресса" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Alexander OS" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css?v=10.3" />
  <title>Alexander OS vNext</title>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-brand">
        <div class="brand-mark" aria-hidden="true">S</div>
        <div class="topbar-copy">
          <div class="brand-line">Alexander OS <span>vNext</span></div>
          <p class="eyebrow" id="todayLabel">Сегодня</p>
          <h1 id="screenTitle">Главная</h1>
        </div>
      </div>
      <button class="global-add top-add" id="globalAdd" type="button" aria-label="Быстро добавить">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </header>

    <main id="app" class="content" aria-live="polite"></main>

    <button class="floating-add" id="floatingAdd" type="button" aria-label="Быстро добавить">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
    </button>

    <nav class="bottom-nav" aria-label="Основная навигация">
      <button class="nav-item active" type="button" data-screen="dashboard" aria-label="Главная">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path class="nav-fill" d="M3.6 10.7 12 3.8l8.4 6.9v8.7a1.8 1.8 0 0 1-1.8 1.8h-4.3v-6.3H9.7v6.3H5.4a1.8 1.8 0 0 1-1.8-1.8Z"/></svg><small>Главная</small>
      </button>
      <button class="nav-item" type="button" data-screen="finance" aria-label="Финансы">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.7v16.6M7.2 7.2h7.1a3.2 3.2 0 0 1 0 6.4H9.4a3.2 3.2 0 0 0 0 6.4h7.4"/><circle class="nav-dot" cx="12" cy="12" r="9"/></svg><small>Финансы</small>
      </button>
      <button class="nav-item" type="button" data-screen="tasks" aria-label="Задачи">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="3.8" width="16" height="16.4" rx="3"/><path d="m7.6 12.1 2.6 2.6 6.4-6.5"/></svg><small>Задачи</small>
      </button>
      <button class="nav-item" type="button" data-screen="projects" aria-label="Проекты">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3.5" y="7.2" width="17" height="12.6" rx="2.7"/><path d="M8.2 7.2V5.3c0-.8.7-1.5 1.5-1.5h4.6c.8 0 1.5.7 1.5 1.5v1.9M3.5 12.2h17M9.5 12.2v1.5h5v-1.5"/></svg><small>Проекты</small>
      </button>
      <button class="nav-item" type="button" data-screen="growth" aria-label="Прогресс">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 20V13M12 20V8M19 20V4"/><path d="m4.5 9.5 5-4 4 2.5 6-5"/></svg><small>Прогресс</small>
      </button>
      <button class="nav-item settings-nav" id="settingsNavButton" type="button" data-screen="settings" aria-label="Настройки">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3.1"/><path d="M19.1 14.8a1.6 1.6 0 0 0 .3 1.8l.1.1-2.1 2.1-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5v.2h-3v-.2a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1-2.1-2.1.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H5.2v-3h.2a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1 2.1-2.1.1.1a1.6 1.6 0 0 0 1.8.3 1.6 1.6 0 0 0 1-1.5v-.2h3v.2a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1 2.1 2.1-.1.1a1.6 1.6 0 0 0-.3 1.8 1.6 1.6 0 0 0 1.5 1h.2v3h-.2a1.6 1.6 0 0 0-1.5 1Z"/></svg><small>Настройки</small>
      </button>
    </nav>
  </div>


  <section id="lockScreen" class="lock-screen" hidden aria-live="polite">
    <div class="lock-card">
      <div class="face-orb" aria-hidden="true">
        <span class="face-corners"><i></i><i></i><i></i><i></i></span>
        <svg viewBox="0 0 64 64"><path d="M22 28v-4a6 6 0 0 1 6-6h2M42 28v-4a6 6 0 0 0-6-6h-2M22 36v4a6 6 0 0 0 6 6h2M42 36v4a6 6 0 0 1-6 6h-2"/><path d="M26 31h.1M38 31h.1M27 38c3 2.4 7 2.4 10 0"/></svg>
      </div>
      <p class="eyebrow">Alexander OS vNext</p>
      <h2>Разблокировка Face ID</h2>
      <p id="lockHint">Подтверди вход, чтобы открыть личные данные.</p>
      <div class="face-status" id="faceStatus"><span></span> Ожидание подтверждения</div>
      <button class="btn primary full face-retry" type="button" id="unlockFaceId">Повторить Face ID</button>
      <div class="lock-divider"><span>резервный вход</span></div>
      <form id="unlockPinForm" class="lock-pin-form">
        <input id="unlockPin" type="password" inputmode="numeric" autocomplete="one-time-code" maxlength="8" placeholder="PIN-код" aria-label="PIN-код">
        <button class="btn secondary" type="submit">Открыть</button>
      </form>
      <p class="lock-error" id="lockError" role="alert"></p>
    </div>
  </section>

  <dialog id="modal" class="modal">
    <form class="modal-card" id="modalForm" novalidate>
      <div class="modal-head">
        <h2 id="modalTitle">Добавить</h2>
        <button class="icon-btn" id="modalClose" type="button" aria-label="Закрыть">✕</button>
      </div>
      <div id="modalBody"></div>
      <div class="modal-actions" id="modalActions">
        <button class="btn secondary" id="modalCancel" type="button">Отмена</button>
        <button class="btn primary" id="modalSubmit" type="submit">Сохранить</button>
      </div>
    </form>
  </dialog>


  <script src="app.js?v=10.3"></script>
</body>
</html>
